<style>

  body { background: #f5f5f5; font-family: 'Inter', sans-serif; color: #222; }

  header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 24px;
    text-align: center;
  }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: .05em; }
  header p  { color: #888; font-size: .85rem; margin-top: 4px; }

  main { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }

  #gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 24px;
    justify-items: center;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .avatar {
    width: 120px; height: 120px;
    border-radius: 50%;
    overflow: hidden;
    background: #ddd;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
    transition: box-shadow .2s;
  }
  .card:hover .avatar { box-shadow: 0 4px 16px rgba(0,0,0,.2); }

  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  #pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 40px;
  }

  #pagination button {
    background: #fff;
    border: 1px solid #ddd;
    color: #444;
    font-family: inherit;
    font-size: .82rem;
    min-width: 36px; height: 36px;
    padding: 0 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  #pagination button:hover:not(:disabled) { background: #f0f0f0; border-color: #bbb; }
  #pagination button.active { background: #222; color: #fff; border-color: #222; font-weight: 600; }
  #pagination button:disabled { opacity: .35; cursor: default; }

  .info { text-align: center; color: #aaa; font-size: .78rem; margin-top: 12px; }
</style>

const PER = 30;
let page = 0;
const total = Math.ceil(images.length / PER);

document.getElementById('sub').textContent = images.length.toLocaleString() + ' Profiles';

function encode(f) {
  return f.replace(/ /g,'%20').replace(/\(/g,'%28').replace(/\)/g,'%29');
}

function render() {
  const s = page * PER, e = Math.min(s + PER, images.length);
  const g = document.getElementById('gallery');
  g.innerHTML = '';
  for (let i = s; i < e; i++) {
    const div = document.createElement('div'); div.className = 'card';
    const av  = document.createElement('div'); av.className = 'avatar';
    const img = document.createElement('img');
    img.src = BASE + encode(images[i]);
    img.alt = ''; img.loading = 'lazy';
    av.appendChild(img); div.appendChild(av); g.appendChild(div);
  }
  renderPag();
  document.getElementById('info').textContent = `Showing ${s+1}–${e} of ${images.length}`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPag() {
  const p = document.getElementById('pagination'); p.innerHTML = '';
  const b = (t, fn, dis, act) => {
    const btn = document.createElement('button');
    btn.textContent = t; btn.disabled = dis;
    if (act) btn.className = 'active';
    btn.onclick = fn; return btn;
  };
  p.appendChild(b('←', ()=>{page--;render();}, page===0));
  let lo = Math.max(0, page-3), hi = Math.min(total-1, lo+6);
  if (hi-lo<6) lo = Math.max(0, hi-6);
  if (lo>0) { p.appendChild(b('1',()=>{page=0;render();},false)); if(lo>1){const d=document.createElement('button');d.textContent='…';d.disabled=true;p.appendChild(d);} }
  for (let i=lo;i<=hi;i++){ const n=i; p.appendChild(b(n+1,()=>{page=n;render();},false,n===page)); }
  if (hi<total-1){ if(hi<total-2){const d=document.createElement('button');d.textContent='…';d.disabled=true;p.appendChild(d);} p.appendChild(b(total,()=>{page=total-1;render();},false)); }
  p.appendChild(b('→', ()=>{page++;render();}, page===total-1));
}
